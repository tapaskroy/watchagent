version: 0.2

# AWS CodeBuild buildspec for building Docker images — STAGING environment
# Builds both API and Web images for linux/amd64 and pushes to ECR

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_API_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/watchagent-staging-api
      - REPOSITORY_WEB_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/watchagent-staging-web
      - IMAGE_TAG=$(cat VERSION 2>/dev/null | tr -d '[:space:]' || echo "latest")
      - echo "Image tag - $IMAGE_TAG"
      - echo Build started on `date`

  build:
    commands:
      - echo Building API Docker image...
      - docker build --platform linux/amd64 -t $REPOSITORY_API_URI:$IMAGE_TAG -t $REPOSITORY_API_URI:latest -f apps/api/Dockerfile .
      - echo Building Web Docker image...
      - docker build --platform linux/amd64 -t $REPOSITORY_WEB_URI:$IMAGE_TAG -t $REPOSITORY_WEB_URI:latest -f apps/web/Dockerfile .

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing API image...
      - docker push $REPOSITORY_API_URI:$IMAGE_TAG
      - docker push $REPOSITORY_API_URI:latest
      - echo Pushing Web image...
      - docker push $REPOSITORY_WEB_URI:$IMAGE_TAG
      - docker push $REPOSITORY_WEB_URI:latest
      - echo Images pushed successfully
      - echo Forcing ECS redeployment...
      - aws ecs update-service --cluster watchagent-staging-cluster --service watchagent-staging-api --force-new-deployment
      - aws ecs update-service --cluster watchagent-staging-cluster --service watchagent-staging-web --force-new-deployment
      - echo ECS redeployment triggered
