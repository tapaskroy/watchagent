name: WatchAgent
options:
  bundleIdPrefix: me.tapaskroy.watchagent
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
settings:
  SWIFT_VERSION: "6.0"
  DEVELOPMENT_TEAM: ""
targets:
  WatchAgent:
    type: application
    platform: iOS
    sources:
      - WatchAgent
    info:
      path: WatchAgent/Info.plist
      properties:
        CFBundleDisplayName: WatchAgent
        CFBundleName: WatchAgent
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: me.tapaskroy.watchagent
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0.0
