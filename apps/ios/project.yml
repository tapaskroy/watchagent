name: WatchAgent
options:
  bundleIdPrefix: me.tapaskroy.watchagent
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: ""
targets:
  WatchAgent:
    type: application
    platform: iOS
    sources:
      - WatchAgent
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: me.tapaskroy.watchagent
      INFOPLIST_VALUES: >-
        CFBundleDisplayName=WatchAgent;
        CFBundleName=WatchAgent;
        CFBundleShortVersionString=1.0.0;
        CFBundleVersion=1;
        UILaunchScreen={};
        UISupportedInterfaceOrientations=UIInterfaceOrientationPortrait;
        UISupportedInterfaceOrientations~ipad=UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight;
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0.0
