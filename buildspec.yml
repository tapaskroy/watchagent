version: 0.2

# AWS CodeBuild buildspec for building Docker images — PRODUCTION
# Builds both API and Web images for linux/amd64 and pushes to ECR.
#
# Trigger with a git SHA so images are tagged immutably:
#   aws codebuild start-build \
#     --project-name watchagent-prod-docker-build \
#     --region us-east-1 \
#     --environment-variables-override name=GIT_SHA,value=$(git rev-parse --short HEAD),type=PLAINTEXT
#
# NOTE: Prefer promoting a staging-tested image over rebuilding for prod:
#   bash scripts/promote.sh <git-sha>

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_API_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/watchagent-prod-api
      - REPOSITORY_WEB_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/watchagent-prod-web
      - IMAGE_TAG=${GIT_SHA:-latest}
      - echo "Image tag - $IMAGE_TAG"
      - echo Build started on `date`

  build:
    commands:
      - echo Building API Docker image...
      - docker build --platform linux/amd64 -t $REPOSITORY_API_URI:$IMAGE_TAG -t $REPOSITORY_API_URI:latest -f apps/api/Dockerfile .
      - echo Building Web Docker image...
      - docker build --platform linux/amd64 -t $REPOSITORY_WEB_URI:$IMAGE_TAG -t $REPOSITORY_WEB_URI:latest -f apps/web/Dockerfile .

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing API image...
      - docker push $REPOSITORY_API_URI:$IMAGE_TAG
      - docker push $REPOSITORY_API_URI:latest
      - echo Pushing Web image...
      - docker push $REPOSITORY_WEB_URI:$IMAGE_TAG
      - docker push $REPOSITORY_WEB_URI:latest
      - echo Images pushed. Deploying to ECS with immutable tag...
      - bash scripts/deploy.sh prod $IMAGE_TAG
      - echo Deployment triggered
